                        <tr align="center">
                            <td width="14%"><b>MC</b></td>
                            <td width="14%"><b>7</b></td>
                            <td width="14%"><b>8</b></td>
                            <td width="14%"><b>9</b></td>
                            <td width="14%"><b>/</b></td>
                            <td width="14%"><b>sqrt</b></td>
                        </tr>
                        <tr align="center">

                            <td width="14%"><b>M+</b></td>

                            <td width="14%"><b>,</b></td>
                            <td width="14%"><b>+</b></td>
